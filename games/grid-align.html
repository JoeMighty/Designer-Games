<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid System - DesignerGames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/game.css">
    <style>
        .grid-stage {
            position: relative;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            aspect-ratio: 1;
            background: var(--off-white);
            border: 2px solid rgba(74, 74, 74, 0.15);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            user-select: none;
        }

        .grid-lines {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .draggable-element {
            position: absolute;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            cursor: grab;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: box-shadow 0.15s;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .draggable-element:active { cursor: grabbing; }
        .draggable-element.snapped { box-shadow: 0 2px 8px rgba(255,107,53,0.5), 0 0 0 2px var(--sunset-orange); }

        .grid-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .grid-btn {
            padding: 8px 18px;
            border: 2px solid rgba(74, 74, 74, 0.2);
            border-radius: var(--border-radius-md);
            background: var(--off-white);
            font-family: var(--font-family);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--charcoal);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .grid-btn.active {
            background: var(--sunset-orange);
            color: white;
            border-color: var(--sunset-orange);
        }

        .grid-btn:hover:not(.active) {
            border-color: var(--sunset-orange);
            color: var(--sunset-orange);
        }

        .snap-info {
            text-align: center;
            color: var(--warm-gray);
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .snap-count {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--sunset-orange);
        }
    </style>
</head>
<body>
    <div class="container" style="padding: 40px 20px;">
        <a href="../index.html" class="back-link">← Back to Home</a>

        <header>
            <h1>Grid System</h1>
            <p>Drag the elements to snap them to the grid lines</p>
        </header>

        <div class="game-area">
            <div class="grid-controls">
                <button class="grid-btn active" data-grid="8">8px Grid</button>
                <button class="grid-btn" data-grid="16">16px Grid</button>
                <button class="grid-btn" data-grid="32">32px Grid</button>
            </div>

            <div class="grid-stage" id="gridStage">
                <canvas class="grid-lines" id="gridCanvas"></canvas>
            </div>

            <div class="snap-info">
                Elements snapped: <span class="snap-count" id="snapCount">0</span> / <span id="totalCount">5</span>
            </div>

            <div class="button-group">
                <button class="button" id="checkButton">Check Alignment</button>
                <button class="button" id="nextButton" style="display:none;">New Layout →</button>
            </div>

            <div id="result"></div>
        </div>

        <div class="score-area">
            <div class="score-header">
                <h2>Session Score</h2>
                <button class="reset-button" id="resetScore">Reset</button>
            </div>
            <div class="score-display" id="scoreDisplay">0</div>
        </div>
    </div>

    <script src="../js/shared/storage.js"></script>
    <script src="../js/shared/scoring.js"></script>
    <script src="../js/shared/ui.js"></script>
    <script src="../js/games/grid-align.js"></script>
</body>
</html>
