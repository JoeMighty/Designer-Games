<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Match - DesignerGames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/game.css">
    <style>
        .color-arena {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .color-swatch {
            height: 180px;
            border-radius: var(--border-radius-md);
            display: flex;
            align-items: flex-end;
            padding: 12px;
            transition: background-color 0.1s;
        }

        .swatch-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .sliders {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .channel-row {
            display: grid;
            grid-template-columns: 60px 1fr 55px;
            align-items: center;
            gap: 15px;
        }

        .channel-label {
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .channel-label.r { background: #e74c3c; }
        .channel-label.g { background: #27ae60; }
        .channel-label.b { background: #2980b9; }

        .channel-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--charcoal);
            text-align: right;
            min-width: 40px;
        }

        .accuracy-display {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            border-radius: var(--border-radius-md);
            background: var(--light-sand);
        }

        .accuracy-percent {
            font-size: 3rem;
            font-weight: 800;
            color: var(--sunset-orange);
        }

        .accuracy-label {
            font-size: 0.9rem;
            color: var(--warm-gray);
            margin-top: 5px;
        }

        .result-bar {
            height: 8px;
            background: rgba(74,74,74,0.15);
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }

        .result-fill {
            height: 100%;
            background: var(--sunset-orange);
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        @media (max-width: 480px) {
            .color-arena {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container" style="padding: 40px 20px;">
        <a href="../index.html" class="back-link">← Back to Home</a>

        <header>
            <h1>Color Match</h1>
            <p>Use the RGB sliders to match the target color as closely as possible</p>
        </header>

        <div class="game-area">
            <div class="color-arena">
                <div class="color-swatch" id="targetSwatch">
                    <span class="swatch-label">Target</span>
                </div>
                <div class="color-swatch" id="userSwatch" style="background: rgb(128,128,128);">
                    <span class="swatch-label">Yours</span>
                </div>
            </div>

            <div class="sliders">
                <div class="channel-row">
                    <div class="channel-label r">R</div>
                    <input type="range" id="rSlider" min="0" max="255" value="128">
                    <span class="channel-value" id="rValue">128</span>
                </div>
                <div class="channel-row">
                    <div class="channel-label g">G</div>
                    <input type="range" id="gSlider" min="0" max="255" value="128">
                    <span class="channel-value" id="gValue">128</span>
                </div>
                <div class="channel-row">
                    <div class="channel-label b">B</div>
                    <input type="range" id="bSlider" min="0" max="255" value="128">
                    <span class="channel-value" id="bValue">128</span>
                </div>
            </div>

            <div class="accuracy-display" id="accuracyDisplay" style="display:none;">
                <div class="accuracy-percent" id="accuracyPercent">--</div>
                <div class="accuracy-label">Color Accuracy</div>
                <div class="result-bar"><div class="result-fill" id="resultFill"></div></div>
            </div>

            <div class="button-group">
                <button class="button" id="checkButton">Check Match</button>
                <button class="button" id="nextButton" style="display:none;">New Color →</button>
            </div>
        </div>

        <div class="score-area">
            <div class="score-header">
                <h2>Session Score</h2>
                <button class="reset-button" id="resetScore">Reset</button>
            </div>
            <div class="score-display" id="scoreDisplay">0</div>
        </div>
    </div>

    <script src="../js/shared/storage.js"></script>
    <script src="../js/shared/scoring.js"></script>
    <script src="../js/shared/ui.js"></script>
    <script src="../js/games/color-match.js"></script>
</body>
</html>
