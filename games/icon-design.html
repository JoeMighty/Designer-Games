<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Design Challenge - DesignerGames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/game.css">
    <style>
        .icon-arena {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .icon-panel {
            text-align: center;
        }

        .icon-panel-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--warm-gray);
            margin-bottom: 10px;
        }

        canvas {
            border: 2px solid rgba(74, 74, 74, 0.15);
            border-radius: var(--border-radius-md);
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            touch-action: none;
        }

        #targetCanvas {
            cursor: default;
        }

        .tools-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .tool-btn {
            padding: 8px 14px;
            border: 2px solid rgba(74, 74, 74, 0.2);
            border-radius: var(--border-radius-md);
            background: var(--off-white);
            font-family: var(--font-family);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--charcoal);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .tool-btn.active {
            background: var(--sunset-orange);
            color: white;
            border-color: var(--sunset-orange);
        }

        .tool-btn:hover:not(.active) {
            border-color: var(--sunset-orange);
            color: var(--sunset-orange);
        }

        .color-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .color-swatch-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .color-swatch-btn.active {
            border-color: var(--charcoal);
            transform: scale(1.2);
        }

        .stroke-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .stroke-label {
            font-size: 0.85rem;
            color: var(--warm-gray);
            font-weight: 600;
        }

        .similarity-text {
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            min-height: 28px;
        }

        @media (max-width: 500px) {
            .icon-arena {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container" style="padding: 40px 20px;">
        <a href="../index.html" class="back-link">← Back to Home</a>

        <header>
            <h1>Icon Design</h1>
            <p>Recreate the target icon using the drawing tools</p>
        </header>

        <div class="game-area">
            <div class="icon-arena">
                <div class="icon-panel">
                    <div class="icon-panel-label">Target Icon</div>
                    <canvas id="targetCanvas" width="200" height="200"></canvas>
                </div>
                <div class="icon-panel">
                    <div class="icon-panel-label">Your Drawing</div>
                    <canvas id="drawCanvas" width="200" height="200"></canvas>
                </div>
            </div>

            <div class="tools-row" id="toolsRow">
                <button class="tool-btn active" data-tool="pen">✏️ Pen</button>
                <button class="tool-btn" data-tool="line">/ Line</button>
                <button class="tool-btn" data-tool="rect">□ Rect</button>
                <button class="tool-btn" data-tool="circle">○ Circle</button>
                <button class="tool-btn" data-tool="eraser">⌫ Erase</button>
            </div>

            <div class="color-row" id="colorRow">
                <span class="stroke-label">Color:</span>
                <div class="color-swatch-btn active" data-color="#1A1A1A" style="background:#1A1A1A"></div>
                <div class="color-swatch-btn" data-color="#FF6B35" style="background:#FF6B35"></div>
                <div class="color-swatch-btn" data-color="#FF8C42" style="background:#FF8C42"></div>
                <div class="color-swatch-btn" data-color="#FFB627" style="background:#FFB627"></div>
                <div class="color-swatch-btn" data-color="#4A4A4A" style="background:#4A4A4A"></div>
                <div class="color-swatch-btn" data-color="#FFFFFF" style="background:#FFFFFF; border:2px solid #ccc;"></div>
            </div>

            <div class="stroke-row">
                <span class="stroke-label">Size:</span>
                <input type="range" id="strokeSize" min="1" max="20" value="3" style="width:120px;">
                <span id="strokeSizeVal" style="font-weight:700; color:var(--charcoal);">3</span>
            </div>

            <div class="similarity-text" id="similarityText"></div>

            <div class="button-group">
                <button class="button secondary" id="clearDraw">Clear</button>
                <button class="button" id="checkButton">Score Drawing</button>
                <button class="button" id="nextButton" style="display:none;">Next Icon →</button>
            </div>
        </div>

        <div class="score-area">
            <div class="score-header">
                <h2>Session Score</h2>
                <button class="reset-button" id="resetScore">Reset</button>
            </div>
            <div class="score-display" id="scoreDisplay">0</div>
        </div>
    </div>

    <script src="../js/shared/storage.js"></script>
    <script src="../js/shared/scoring.js"></script>
    <script src="../js/shared/ui.js"></script>
    <script src="../js/games/icon-design.js"></script>
</body>
</html>
